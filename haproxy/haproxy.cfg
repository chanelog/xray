# /etc/haproxy/haproxy.cfg
# Generated for tunnel-suite. install.sh fills in the domain and the stats
# page credentials before this file is copied into place.
#
# Role: HAProxy owns the public port 443. It never terminates TLS here -
# it only peeks at the (unencrypted) SNI field inside the TLS ClientHello
# and routes the still-encrypted bytes accordingly:
#
#   SNI = ssh.__DOMAIN__   -> stunnel on 127.0.0.1:777  (mode "SSL", raw SSH)
#   anything else          -> Nginx on 127.0.0.1:8443   (VMess/VLess/Trojan/
#                                                         SS WS+gRPC, SSH-WS)
#
# This lets SSH-SSL be reached over port 443 too (useful on networks that
# only allow outbound 443), without HAProxy ever holding a private key.
# Port 80 (ntls / ACME challenge) is untouched and stays directly on Nginx.

global
    log /dev/log local0
    maxconn 4096
    daemon
    stats socket /run/haproxy/admin.sock mode 660 level admin

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect 5s
    timeout client  3m
    timeout server  3m
    timeout tunnel  1h

# ---------------------------------------------------------------------------
# Public entry point
# ---------------------------------------------------------------------------
frontend ft_tls_443
    bind *:443
    tcp-request inspect-delay 5s
    tcp-request content accept if { req.ssl_hello_type 1 }

    acl is_ssh_ssl req.ssl_sni -i ssh.__DOMAIN__
    use_backend bk_ssh_ssl if is_ssh_ssl
    default_backend bk_nginx_tls

backend bk_ssh_ssl
    server stunnel 127.0.0.1:777

backend bk_nginx_tls
    server nginx 127.0.0.1:8443

# ---------------------------------------------------------------------------
# Internal-only stats page (127.0.0.1, not exposed publicly)
#   view from the VPS itself: curl -u __STATS_USER__:<password> http://127.0.0.1:9000/
# ---------------------------------------------------------------------------
listen stats
    bind 127.0.0.1:9000
    mode http
    stats enable
    stats uri /
    stats refresh 10s
    stats hide-version
    stats auth __STATS_USER__:__STATS_PASS__
