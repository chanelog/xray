name: Release SSHWS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - run: chmod +x build.sh

      - run: ./build.sh

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*
