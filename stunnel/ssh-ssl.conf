# /etc/stunnel/ssh-ssl.conf
# "SSL" mode SSH tunnel: client connects with TLS directly (no HTTP/websocket
# layer at all) and stunnel forwards the decrypted stream straight to sshd.
# This is what apps like HTTP Injector call "SSH SSL" (as opposed to "SSH WS").
#
# Install: apt-get install -y stunnel4
# Cert: reuses the same certificate issued by acme.sh for the domain
#       (installed by install.sh into /etc/tunnel-suite/ssl/)
# Enable: edit /etc/default/stunnel4 -> set ENABLED=1
#         systemctl restart stunnel4

pid = /var/run/stunnel-ssh.pid
output = /var/log/stunnel-ssh.log
setuid = root
setgid = root

[ssh-ssl]
client = no
accept = 777
connect = 127.0.0.1:22
cert = /etc/tunnel-suite/ssl/fullchain.pem
key  = /etc/tunnel-suite/ssl/privkey.pem
