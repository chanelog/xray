# /etc/nginx/conf.d/tunnel.conf
# Generated for tunnel-suite. Placeholder __DOMAIN__ is replaced by install.sh.
# Loaded automatically because the shipped nginx.conf already has:
#   include /etc/nginx/conf.d/*.conf;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---------------------------------------------------------------------------
# Port 80 - "ntls" mode: no TLS at the origin. Used when the client relies on
# a front CDN (e.g. Cloudflare orange-cloud / "flexible SSL") for the
# encrypted hop, or for plain non-encrypted WS testing.
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    location /vmess {
        proxy_pass http://127.0.0.1:10001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }
    location /vless {
        proxy_pass http://127.0.0.1:10002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }
    location /trojan-ws {
        proxy_pass http://127.0.0.1:10003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }
    location /ss-ws {
        proxy_pass http://127.0.0.1:10004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }
    location /ssh-ws {
        proxy_pass http://127.0.0.1:700;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }
    location /dropbear-ws {
        proxy_pass http://127.0.0.1:701;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    # ACME http-01 challenge path (kept for webroot-mode issuance if ever
    # switched away from acme.sh's --standalone mode)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / { return 404; }
}

# ---------------------------------------------------------------------------
# Port 8443 (127.0.0.1 only) - "TLS" mode: real certificate terminated here.
# Public port 443 is now owned by HAProxy, which passes the still-encrypted
# TCP stream through to this internal port (see /etc/haproxy/haproxy.cfg).
# ---------------------------------------------------------------------------
server {
    listen 127.0.0.1:8443 ssl http2;
    server_name __DOMAIN__;

    ssl_certificate     /etc/tunnel-suite/ssl/fullchain.pem;
    ssl_certificate_key /etc/tunnel-suite/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location /vmess {
        proxy_pass http://127.0.0.1:10001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }
    location /vless {
        proxy_pass http://127.0.0.1:10002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }
    location /trojan-ws {
        proxy_pass http://127.0.0.1:10003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }
    location /ss-ws {
        proxy_pass http://127.0.0.1:10004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }
    location /ssh-ws {
        proxy_pass http://127.0.0.1:700;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }
    location /dropbear-ws {
        proxy_pass http://127.0.0.1:701;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    # gRPC (HTTP/2) - only offered here on 443, gRPC needs real TLS+HTTP2 in
    # practice, most client apps don't support gRPC over plain h2c on :80.
    location /trojan-grpc {
        grpc_pass grpc://127.0.0.1:10005;
    }
    location /ss-grpc {
        grpc_pass grpc://127.0.0.1:10006;
    }

    location / { return 404; }
}
